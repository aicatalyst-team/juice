apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice
  namespace: juice
  labels:
    app.kubernetes.io/name: juice
    app.kubernetes.io/managed-by: autopoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: juice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juice
    spec:
      containers:
        - name: juice
          image: quay.io/aicatalyst/juice-juice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: JUICE_DB
              value: "/data/juice.db"
            - name: JUICE_HOST
              value: "0.0.0.0"
            - name: JUICE_PORT
              value: "8080"
            - name: JUICE_TOKEN
              value: "autopoc"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: juice-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/manifest
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/manifest
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: juice-data
          persistentVolumeClaim:
            claimName: juice-data
